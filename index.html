<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <title>happy birthday</title>
    <style>
        body {
            margin: 0;
            overflow-y: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;

            background: linear-gradient(135deg, #fff3e0, #ffe0f0, #e0f7ff);
            font-family: Arial, sans-serif;
        }

        .content {
            position: relative;
            width: 90vw;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            margin-top: 40px;
        }

        .content:first-child {
            margin-top: 60px;
        }

        .content:last-child {
            margin-bottom: 60px;
        }

        video {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <!-- 첫 번째 영상 -->
    <div class="content">
        <video controls playsinline onclick="pauseOthers(this)">
            <source src="https://namankum.github.io/JMH/beauty1.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 두 번째 영상 -->
    <div class="content">
        <video controls playsinline onclick="pauseOthers(this)">
            <source src="https://namankum.github.io/JMH/beauty2.mp4" type="video/mp4">
        </video>
    </div>

<script>
function pauseOthers(currentVideo) {
    const videos = document.querySelectorAll("video");
    videos.forEach(video => {
        if (video !== currentVideo) {
            video.pause();
        }
    });
}
</script>

</body>
</html>
