<!DOCTYPE html>
<html lang="kr">
<head>
<meta charset="UTF-8">
<title>happy birthday</title>

<style>
body {
    margin: 0;
    min-height: 100vh;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center; /* ⭐ 핵심 */

    background: linear-gradient(135deg, #fff3e0, #ffe0f0, #e0f7ff);
    font-family: Arial, sans-serif;
}

.content {
    width: 90vw;
    max-width: 800px;
    aspect-ratio: 16 / 9;
    margin: 20px 0;
}

video {
    width: 100%;
    height: 100%;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

/* 👉 모바일에서만 다르게 */
@media (max-width: 768px) {
    body {
        justify-content: flex-start; /* 📱 모바일은 자연스럽게 */
        padding-top: 40px;
        padding-bottom: 60px;
    }
}
</style>
</head>

<body>

<div class="content">
    <video controls playsinline onclick="pauseOthers(this)">
        <source src="https://namankum.github.io/JMH/beauty1.mp4" type="video/mp4">
    </video>
</div>

<div class="content">
    <video controls playsinline onclick="pauseOthers(this)">
        <source src="https://namankum.github.io/JMH/beauty2.mp4" type="video/mp4">
    </video>
</div>

<script>
function pauseOthers(currentVideo) {
    document.querySelectorAll("video").forEach(v => {
        if (v !== currentVideo) v.pause();
    });
}
</script>

</body>
</html>
